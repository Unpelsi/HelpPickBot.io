<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dota 2 Counter Pick</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --accent: #e94560;
      --accent2: #f5a623;
      --text: #eaeaea;
      --text-dim: #8899aa;
      --good: #4caf50;
      --bad: #f44336;
      --border: #1e3a5f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, var(--card), var(--surface));
      padding: 16px;
      text-align: center;
      border-bottom: 2px solid var(--accent);
    }
    header h1 { font-size: 1.3rem; color: var(--accent); letter-spacing: 1px; }
    header p { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }

    .search-container {
      padding: 16px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-dim); }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 0 16px 16px;
      max-height: 320px;
      overflow-y: auto;
    }
    .hero-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 6px 4px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.62rem;
      color: var(--text-dim);
    }
    .hero-card:hover { border-color: var(--accent); color: var(--text); transform: scale(1.03); }
    .hero-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 4px;
      background: var(--card);
    }

    .selected-hero {
      margin: 0 16px 16px;
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .selected-hero img {
      width: 72px;
      height: 40px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid var(--accent);
    }
    .selected-info h2 { font-size: 1rem; color: var(--accent2); }
    .selected-info p { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }

    .section-title {
      padding: 6px 16px 10px;
      font-size: 0.8rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .counters-list {
      padding: 0 16px 80px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .counter-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .counter-item img {
      width: 56px;
      height: 32px;
      object-fit: cover;
      border-radius: 6px;
    }
    .counter-info { flex: 1; }
    .counter-info .name { font-size: 0.9rem; font-weight: 600; }
    .counter-info .wr { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }
    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .badge.hard { background: #3d0000; color: #ff5252; border: 1px solid #ff5252; }
    .badge.medium { background: #3d2200; color: var(--accent2); border: 1px solid var(--accent2); }
    .badge.soft { background: #1a3d00; color: var(--good); border: 1px solid var(--good); }

    .winrate-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin-top: 5px;
      overflow: hidden;
    }
    .winrate-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

    .loading {
      text-align: center;
      padding: 32px;
      color: var(--text-dim);
      font-size: 0.9rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 48px 24px; color: var(--text-dim); }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty p { font-size: 0.9rem; line-height: 1.5; }

    .tab-bar {
      display: flex;
      padding: 0 16px;
      gap: 8px;
      margin-bottom: 8px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      border-radius: 8px;
      font-size: 0.78rem;
      cursor: pointer;
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      transition: all 0.15s;
    }
    .tab.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }

    .back-btn {
      margin: 0 16px 12px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      color: var(--text-dim);
      font-size: 0.82rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    #page-pick { display: block; }
    #page-result { display: none; }
  </style>
</head>
<body>

<header>
  <h1>⚔️ DOTA 2 COUNTER PICK</h1>
  <p>Выбери героя — узнай, кем его контрить</p>
</header>

<!-- PICK PAGE -->
<div id="page-pick">
  <div class="search-container">
    <input class="search-input" id="search" type="text" placeholder="🔍 Поиск героя..." oninput="filterHeroes(this.value)" />
  </div>
  <div class="hero-grid" id="hero-grid">
    <div class="loading"><div class="spinner"></div>Загрузка героев...</div>
  </div>
</div>

<!-- RESULT PAGE -->
<div id="page-result">
  <div style="height:12px"></div>
  <button class="back-btn" onclick="goBack()">← Назад</button>
  <div class="selected-hero" id="selected-hero-card"></div>
  <div class="tab-bar">
    <div class="tab active" id="tab-counter" onclick="switchTab('counter')">Контрпики</div>
    <div class="tab" id="tab-synergy" onclick="switchTab('synergy')">Синергия</div>
  </div>
  <div class="section-title" id="result-label">Лучшие контрпики</div>
  <div class="counters-list" id="counters-list">
    <div class="loading"><div class="spinner"></div>Загружаю данные...</div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.setHeaderColor('#1a1a2e'); }

let allHeroes = [];
let matchupData = {};
let currentHero = null;
let currentTab = 'counter';

const IMG_BASE = 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/';
const IMG_SMALL = 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/heroes/';

function heroImg(name) {
  // name like "npc_dota_hero_antimage" -> "antimage"
  const short = name.replace('npc_dota_hero_', '');
  return `${IMG_BASE}${short}.png`;
}

async function loadHeroes() {
  try {
    const res = await fetch('https://api.opendota.com/api/heroes');
    allHeroes = await res.json();
    renderHeroGrid(allHeroes);
  } catch(e) {
    document.getElementById('hero-grid').innerHTML = '<div class="loading">Ошибка загрузки. Проверь интернет.</div>';
  }
}

function renderHeroGrid(heroes) {
  const grid = document.getElementById('hero-grid');
  if (!heroes.length) { grid.innerHTML = '<div class="loading">Герой не найден</div>'; return; }
  grid.innerHTML = heroes.map(h => `
    <div class="hero-card" onclick="selectHero(${h.id})">
      <img src="${heroImg(h.name)}" alt="${h.localized_name}" onerror="this.src='https://via.placeholder.com/80x45/0f3460/fff?text=?'" loading="lazy"/>
      ${h.localized_name}
    </div>
  `).join('');
}

function filterHeroes(q) {
  const filtered = allHeroes.filter(h => h.localized_name.toLowerCase().includes(q.toLowerCase()));
  renderHeroGrid(filtered);
}

async function selectHero(heroId) {
  currentHero = allHeroes.find(h => h.id === heroId);
  currentTab = 'counter';
  showResultPage();
  renderSelectedHero();
  updateTabs();
  document.getElementById('counters-list').innerHTML = '<div class="loading"><div class="spinner"></div>Загружаю матчапы...</div>';

  try {
    const res = await fetch(`https://api.opendota.com/api/heroes/${heroId}/matchups`);
    const data = await res.json();
    matchupData = {};
    data.forEach(m => { matchupData[m.hero_id] = m; });
    renderResults();
  } catch(e) {
    document.getElementById('counters-list').innerHTML = '<div class="loading">Ошибка загрузки данных матчапов</div>';
  }
}

function renderSelectedHero() {
  const h = currentHero;
  document.getElementById('selected-hero-card').innerHTML = `
    <img src="${heroImg(h.name)}" alt="${h.localized_name}" onerror="this.src='https://via.placeholder.com/72x40/0f3460/fff?text=?'"/>
    <div class="selected-info">
      <h2>${h.localized_name}</h2>
      <p>Атрибут: ${attrLabel(h.primary_attr)} · ${h.attack_type === 'Melee' ? '⚔️ Ближний' : '🏹 Дальний'}</p>
    </div>
  `;
}

function attrLabel(a) {
  return {str:'💪 Сила', agi:'🌿 Ловкость', int:'🧠 Интеллект', all:'✨ Универсал'}[a] || a;
}

function switchTab(tab) {
  currentTab = tab;
  updateTabs();
  renderResults();
}

function updateTabs() {
  document.getElementById('tab-counter').className = 'tab' + (currentTab === 'counter' ? ' active' : '');
  document.getElementById('tab-synergy').className = 'tab' + (currentTab === 'synergy' ? ' active' : '');
  document.getElementById('result-label').textContent = currentTab === 'counter' ? 'Лучшие контрпики' : 'Лучшая синергия';
}

function renderResults() {
  const list = document.getElementById('counters-list');
  if (!Object.keys(matchupData).length) return;

  // winrate = wins / games_played for OPPONENT when playing AGAINST currentHero
  // For counters: we want heroes that WIN MOST against currentHero -> high opp winrate
  // For synergy: we want heroes that WIN MOST with currentHero -> we use games where currentHero wins, approximated differently
  // OpenDota matchups: wins = wins of currentHero against that hero_id
  // So low wins / games = hero_id COUNTERS currentHero (currentHero loses)
  // Counter of currentHero = hero_id with LOWEST (wins/games)

  let scores = Object.entries(matchupData)
    .filter(([id]) => parseInt(id) !== currentHero.id)
    .map(([id, m]) => {
      const heroInfo = allHeroes.find(h => h.id === parseInt(id));
      if (!heroInfo || m.games_played < 100) return null;
      const wr = m.wins / m.games_played; // currentHero winrate vs this hero
      return { heroInfo, wr, games: m.games_played };
    })
    .filter(Boolean);

  if (currentTab === 'counter') {
    // Heroes where currentHero has LOWEST winrate = these heroes counter currentHero
    scores.sort((a, b) => a.wr - b.wr);
  } else {
    // Synergy: heroes with which currentHero wins most = highest wr
    scores.sort((a, b) => b.wr - a.wr);
  }

  const top = scores.slice(0, 15);
  const minWr = Math.min(...top.map(s => s.wr));
  const maxWr = Math.max(...top.map(s => s.wr));

  list.innerHTML = top.map((s, i) => {
    const wrPct = (currentTab === 'counter' ? (1 - s.wr) : s.wr) * 100;
    const diff = ((currentTab === 'counter' ? (1 - s.wr) : s.wr) - 0.5) * 100;
    const diffStr = diff >= 0 ? '+' + diff.toFixed(1) : diff.toFixed(1);
    let badgeClass, badgeText;
    if (i < 3) { badgeClass = 'hard'; badgeText = currentTab === 'counter' ? '🔥 Жёсткий' : '⭐ Топ'; }
    else if (i < 7) { badgeClass = 'medium'; badgeText = currentTab === 'counter' ? '⚡ Средний' : '👍 Хорош'; }
    else { badgeClass = 'soft'; badgeText = currentTab === 'counter' ? '✓ Слабый' : '🆗 Норм'; }

    const barColor = currentTab === 'counter' ? '#f44336' : '#4caf50';
    const barWidth = Math.min(100, Math.max(0, (wrPct - 45) * 10));

    return `
      <div class="counter-item">
        <img src="${heroImg(s.heroInfo.name)}" alt="${s.heroInfo.localized_name}"
             onerror="this.src='https://via.placeholder.com/56x32/0f3460/fff?text=?'" loading="lazy"/>
        <div class="counter-info">
          <div class="name">${s.heroInfo.localized_name}</div>
          <div class="wr">${currentTab === 'counter' ? 'Побед против: ' : 'Побед вместе: '}${wrPct.toFixed(1)}% (${diffStr}%) · ${(s.games/1000).toFixed(1)}k игр</div>
          <div class="winrate-bar"><div class="winrate-bar-fill" style="width:${barWidth}%;background:${barColor}"></div></div>
        </div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
    `;
  }).join('');
}

function showResultPage() {
  document.getElementById('page-pick').style.display = 'none';
  document.getElementById('page-result').style.display = 'block';
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('page-pick').style.display = 'block';
  document.getElementById('page-result').style.display = 'none';
}

loadHeroes();
</script>
</body>
</html>
