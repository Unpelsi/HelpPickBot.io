    .selected-card{margin:0 12px 12px;background:var(--surface);border:2px solid var(--accent);border-radius:13px;padding:12px;display:flex;align-items:center;gap:12px;}

    .si h2{font-size:0.95rem;color:var(--accent2);}
    .si p{font-size:0.7rem;color:var(--dim);margin-top:2px;}
    .tabs{display:flex;padding:0 12px;gap:7px;margin-bottom:8px;}
    .tab{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:0.75rem;cursor:pointer;border:1.5px solid var(--border);color:var(--dim);transition:all .15s;}
    .tab.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600;}
    .sec-title{padding:4px 12px 8px;font-size:0.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;}
    .list{padding:0 12px 80px;display:flex;flex-direction:column;gap:7px;}
    .ci{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:9px 11px;display:flex;align-items:center;gap:10px;animation:fi .2s ease;}
    @keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    .ci img{width:54px;height:30px;object-fit:cover;border-radius:5px;flex-shrink:0;}
    .cinfo{flex:1;min-width:0;}
    .cinfo .nm{font-size:0.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cinfo .wr{font-size:0.68rem;color:var(--dim);margin-top:2px;}
    .bar{width:100%;height:4px;background:var(--border);border-radius:4px;margin-top:4px;overflow:hidden;}
    .barf{height:100%;border-radius:4px;}
    .badge{font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}

    .mid{background:#3d2200;color:var(--accent2);border:1px solid var(--accent2);}

    .back-btn:hover{border-color:var(--accent);color:var(--accent);}
    #pp{display:block;}#rp{display:none;}
    .empty{text-align:center;padding:40px 20px;color:var(--dim);font-size:0.85rem;}

</head>

const IMG='https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/';
let cur=null,mode='c';

function img(name){return IMG+name.replace('npc_dota_hero_','')+'.png';}
function attr(a){return {str:'💪 Сила',agi:'🌿 Ловкость',int:'🧠 Интеллект',all:'✨ Унив.'}[a]||a;}

function render(list){
  const g=document.getElementById('grid');
  if(!list.length){g.innerHTML='<div class="empty">Герой не найден</div>';return;}
  g.innerHTML=list.map(h=>`<div class="hc" onclick="pick(${h.id})"><img src="${img(h.name)}" loading="lazy" onerror="this.style.background='#0f3460'"/>${h.localized_name}</div>`).join('');
}

function filter(q){render(heroes.filter(h=>h.localized_name.toLowerCase().includes(q.toLowerCase())));}

function pick(id){
  cur=heroes.find(h=>h.id===id);
  mode='c';
  document.getElementById('pp').style.display='none';
  document.getElementById('rp').style.display='block';
  window.scrollTo(0,0);
  const h=cur;
  document.getElementById('sc').innerHTML=`<img src="${img(h.name)}" onerror="this.style.background='#0f3460'"/><div class="si"><h2>${h.localized_name}</h2><p>${attr(h.primary_attr)} · ${h.attack_type==='Melee'?'⚔️ Ближний':'🏹 Дальний'} · ${h.roles.slice(0,2).join(', ')}</p></div>`;
  updateTabs();showList();
}

function tab(m){mode=m;updateTabs();showList();}
function updateTabs(){
  document.getElementById('tc').className='tab'+(mode==='c'?' active':'');
  document.getElementById('ts').className='tab'+(mode==='s'?' active':'');
  document.getElementById('stitle').textContent=mode==='c'?'Лучшие контрпики':'Лучшая синергия';
}

function showList(){
  const raw=countersDB[cur.id]||[];
  // For synergy, reverse the list (best allies ≈ worst counters inverted + different set)
  const items = mode==='c' ? [...raw] : [...raw].reverse();
  const l=document.getElementById('list');
  l.innerHTML=items.slice(0,10).map((entry,i)=>{
    const h=heroes.find(x=>x.id===entry.id);
    if(!h)return'';
    const adv=(entry.adv+50).toFixed(1);
    const barW=Math.min(100,Math.max(0,entry.adv*8));
    const barC=mode==='c'?'#f44336':'#4caf50';
    let bc,bt;
    if(i<3){bc='hard';bt=mode==='c'?'🔥 Жёсткий':'⭐ Топ';}
    else if(i<6){bc='mid';bt=mode==='c'?'⚡ Средний':'👍 Хорош';}
    else{bc='soft';bt=mode==='c'?'✓ Слабый':'🆗 Норм';}
    return `<div class="ci"><img src="${img(h.name)}" loading="lazy" onerror="this.style.background='#0f3460'"/>
      <div class="cinfo"><div class="nm">${h.localized_name}</div>
      <div class="wr">Преимущество: +${entry.adv}% WR</div>
      <div class="bar"><div class="barf" style="width:${barW}%;background:${barC}"></div></div></div>
      <span class="badge ${bc}">${bt}</span></div>`;
  }).join('');
}

function back(){
  document.getElementById('pp').style.display='block';
  document.getElementById('rp').style.display='none';
}

render(heroes);
